name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: hashFiles('package.json') != ''
        run: pnpm run lint

      - name: Test
        if: hashFiles('package.json') != ''
        run: pnpm test

      - name: Build
        if: hashFiles('package.json') != ''
        run: pnpm run build
