version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ../src:/app/src
      - ../uploads:/app/uploads
    environment:
      - NODE_ENV=development
      - PORT=3000
    env_file:
      - ../.env
    command: npm run start:dev
