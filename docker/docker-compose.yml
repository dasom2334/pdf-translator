version: '3.8'
services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ../src:/app/src        # hot-reload용
      - ../uploads:/app/uploads
    env_file:
      - ../.env
    environment:
      - NODE_ENV=development
    command: npm run start:dev
