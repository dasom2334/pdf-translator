services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../src:/app/src
      - ../assets:/app/assets
      - uploads:/app/uploads
    environment:
      - NODE_ENV=development
    env_file:
      - ../.env
    command: pnpm run start:dev

volumes:
  uploads:
